AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation Template for Full-Stack App - Single EC2 Instance'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy resources into
  Subnets:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for the EC2 Instance (Pick at least one)
  RepoUrl:
    Type: String
    Default: https://github.com/THEN01EXPLORER/FSD-1-Experiment-9.git
    Description: URL of the GitHub repository to clone

Resources:
  # Security Group for the EC2 instance
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic (80) and SSH (22)
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  # Single EC2 Instance - t2.micro hardcoded (Free Tier eligible)
  AppInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref AppSecurityGroup
          SubnetId: !Select [ 0, !Ref Subnets ]
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          dnf update -y
          dnf install -y docker git
          systemctl start docker
          systemctl enable docker
          usermod -a -G docker ec2-user
          mkdir -p /usr/local/lib/docker/cli-plugins/
          curl -SL https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-linux-x86_64 -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
          git clone ${RepoUrl} /app
          cd /app
          docker compose up -d

Outputs:
  InstancePublicDNS:
    Description: Public DNS of the EC2 instance
    Value: !GetAtt AppInstance.PublicDnsName
  AppURL:
    Description: URL to access the application
    Value: !Sub 'http://${AppInstance.PublicDnsName}'
